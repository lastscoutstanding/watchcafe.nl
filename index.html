<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doorsturen naar WatchCafé...</title>
    
    <!-- Directe HTML-doorverwijzing (0 seconden vertraging) -->
    <meta http-equiv="refresh" content="0; url=https://watchcafe.eu">
    
    <!-- JavaScript fallback voor het geval de meta refresh niet werkt -->
    <script>
        window.location.href = "https://watchcafe.eu";
    </script>
</head>
<body>
    <p>Je wordt doorgestuurd naar <a href="https://watchcafe.eu">WatchCafé</a>. Klik op de link als je niet automatisch wordt doorverwezen.</p>
</body>
</html>
